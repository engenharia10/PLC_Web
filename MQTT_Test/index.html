<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MQTT Test — Android</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="MQTT Test">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            padding: 12px;
            gap: 10px;
        }
        h1 { font-size: 18px; color: #38bdf8; text-align: center; padding: 4px 0; }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 2px; }
        select, input {
            width: 100%;
            padding: 10px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 14px;
        }
        .row { display: flex; gap: 8px; }
        .row > * { flex: 1; }
        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.15s;
        }
        button:disabled { opacity: 0.4; cursor: default; }
        .btn-connect  { background: #0284c7; color: #fff; }
        .btn-disc     { background: #dc2626; color: #fff; }
        .btn-test     { background: #059669; color: #fff; }
        .btn-clear    { background: #334155; color: #94a3b8; font-size: 13px; padding: 8px; }
        #status-bar {
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            padding: 10px;
            border-radius: 8px;
            background: #1e293b;
            border: 1px solid #334155;
        }
        #status-bar.ok   { background: #052e16; border-color: #16a34a; color: #4ade80; }
        #status-bar.err  { background: #2d0909; border-color: #dc2626; color: #f87171; }
        #status-bar.wait { background: #1c1917; border-color: #78716c; color: #a8a29e; }
        #pkt-count {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #38bdf8;
            letter-spacing: 1px;
        }
        #pkt-count span { font-size: 12px; color: #64748b; display: block; margin-top: 2px; }
        #last-msg {
            font-family: monospace;
            font-size: 12px;
            color: #4ade80;
            word-break: break-all;
            min-height: 20px;
        }
        #log {
            font-family: monospace;
            font-size: 11px;
            color: #94a3b8;
            background: #0f172a;
            border-radius: 6px;
            padding: 8px;
            height: 180px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        #log .entry { color: #64748b; }
        #log .entry.ok  { color: #4ade80; }
        #log .entry.err { color: #f87171; }
        #log .entry.msg { color: #38bdf8; }
        .auth-section { display: flex; flex-direction: column; gap: 8px; }
        #broker-note { font-size: 11px; color: #f59e0b; text-align: center; display: none; }
    </style>
</head>
<body>
    <h1>☁️ MQTT Test — Android</h1>

    <!-- Status -->
    <div id="status-bar" class="wait">⏳ Desconectado</div>

    <!-- Contador + última msg -->
    <div class="card">
        <div id="pkt-count">0 <span>pacotes recebidos</span></div>
        <div id="last-msg">aguardando dados...</div>
    </div>

    <!-- Config -->
    <div class="card">
        <div>
            <label>Broker</label>
            <select id="host">
                <option value="04ee441e0bb24887aeb3cb2467b2743c.s1.eu.hivemq.cloud">HiveMQ Cloud (porta 8884)</option>
                <option value="broker.emqx.io">EMQX Public (porta 8084, sem senha)</option>
            </select>
        </div>
        <div id="broker-note">⚠️ EMQX público — sem autenticação, qualquer um pode ver</div>
        <div class="auth-section" id="auth-section">
            <div>
                <label>Usuário</label>
                <input id="user" type="text" value="PLC-web" autocomplete="off">
            </div>
            <div>
                <label>Senha</label>
                <input id="pass" type="password" autocomplete="off">
            </div>
        </div>
        <div>
            <label>Device ID (MAC sem :)</label>
            <input id="devid" type="text" placeholder="Ex: 1C9DC2633298" autocomplete="off" autocapitalize="characters">
        </div>
    </div>

    <!-- Botões principais -->
    <div class="row">
        <button id="btn-connect" class="btn-connect">🔌 Conectar</button>
        <button id="btn-disc" class="btn-disc" disabled>✖ Desconectar</button>
    </div>
    <button id="btn-test" class="btn-test" disabled>📡 Testar Recepção (loopback)</button>

    <!-- Log -->
    <div class="card" style="flex:1;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <label style="margin:0;font-size:13px;color:#64748b;">Log</label>
            <button id="btn-clear" class="btn-clear" style="width:auto;padding:4px 12px;">Limpar</button>
        </div>
        <div id="log"></div>
    </div>

    <script src="js/mqtt.min.js"></script>
    <script>
    (() => {
        const $ = id => document.getElementById(id);
        let client = null, isConn = false, pktCount = 0, topicRx = '', topicTx = '';

        // Persistência
        const saved = JSON.parse(localStorage.getItem('mqtttest') || '{}');
        if (saved.host)  $('host').value  = saved.host;
        if (saved.user)  $('user').value  = saved.user;
        if (saved.pass)  $('pass').value  = saved.pass;
        if (saved.devid) $('devid').value = saved.devid;

        const saveCfg = () => localStorage.setItem('mqtttest', JSON.stringify({
            host: $('host').value, user: $('user').value,
            pass: $('pass').value, devid: $('devid').value
        }));
        ['host','user','pass','devid'].forEach(id => $(id).addEventListener('input', saveCfg));

        // Broker change
        $('host').addEventListener('change', updateBrokerUI);
        function updateBrokerUI() {
            const emqx = $('host').value.includes('emqx.io');
            $('auth-section').style.display = emqx ? 'none' : '';
            $('broker-note').style.display  = emqx ? 'block' : 'none';
        }
        updateBrokerUI();

        // Log
        function log(msg, type = '') {
            const el = document.createElement('div');
            el.className = 'entry ' + type;
            const t = new Date().toLocaleTimeString('pt-BR', { hour12: false });
            el.textContent = `[${t}] ${msg}`;
            const logEl = $('log');
            logEl.appendChild(el);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function setStatus(text, cls) {
            const el = $('status-bar');
            el.textContent = text;
            el.className = cls;
        }

        // Connect
        $('btn-connect').onclick = () => {
            const host  = $('host').value.trim();
            const emqx  = host.includes('emqx.io');
            const user  = emqx ? '' : $('user').value.trim();
            const pass  = emqx ? '' : $('pass').value.trim();
            const devid = $('devid').value.trim().toUpperCase().replace(/:/g, '');

            if (!devid) { log('⚠️ Preencha o Device ID', 'err'); return; }
            if (!emqx && !user) { log('⚠️ Preencha Usuário', 'err'); return; }

            topicRx = `plc/${devid}/rx`;
            topicTx = `plc/${devid}/tx`;

            const port = host.includes('hivemq.cloud') ? 8884 : 8084;
            const url  = `wss://${host}:${port}/mqtt`;
            const cid  = 'mqtttest_' + Math.random().toString(16).slice(2, 8);

            log(`Conectando: ${url}`, '');
            setStatus('⏳ Conectando...', 'wait');

            const opts = {
                clientId: cid,
                clean: true,
                reconnectPeriod: 0,
                connectTimeout: 15000,
                protocolVersion: 4,
                protocolId: 'MQTT',
                keepalive: 60,
                rejectUnauthorized: false
            };
            if (user) { opts.username = user; opts.password = pass; }

            client = mqtt.connect(url, opts);

            client.on('connect', () => {
                isConn = true;
                log(`✅ Conectado! Subscribing: ${topicRx}`, 'ok');
                setStatus('✅ Conectado — ' + devid, 'ok');
                client.subscribe(topicRx, { qos: 1 }, (err) => {
                    if (err) log('❌ Subscribe falhou: ' + err.message, 'err');
                    else     log('📥 Inscrito: ' + topicRx, 'ok');
                });
                $('btn-connect').disabled = true;
                $('btn-disc').disabled    = false;
                $('btn-test').disabled    = false;
            });

            client.on('message', (topic, message) => {
                pktCount++;
                $('pkt-count').innerHTML = pktCount + '<span>pacotes recebidos</span>';
                const txt = new TextDecoder('utf-8', { fatal: false }).decode(
                    message instanceof Uint8Array ? message : new Uint8Array(message)
                );
                $('last-msg').textContent = txt.slice(0, 150);
                log(`📨 [${message.length}b] ${txt.slice(0, 80)}`, 'msg');
            });

            client.on('error', (e) => {
                log('❌ Erro: ' + (e.message || e), 'err');
                setStatus('❌ Erro de conexão', 'err');
            });

            client.on('close', () => {
                if (isConn) log('🔌 Desconectado', 'err');
                isConn = false;
                setStatus('⏳ Desconectado', 'wait');
                $('btn-connect').disabled = false;
                $('btn-disc').disabled    = true;
                $('btn-test').disabled    = true;
            });

            client.on('offline', () => log('📡 Sem rede', 'err'));
        };

        // Disconnect
        $('btn-disc').onclick = () => {
            if (client) { client.end(true); client = null; }
            isConn = false;
            log('Desconectado pelo usuário');
            setStatus('⏳ Desconectado', 'wait');
            $('btn-connect').disabled = false;
            $('btn-disc').disabled    = true;
            $('btn-test').disabled    = true;
        };

        // Loopback test
        $('btn-test').onclick = () => {
            if (!client || !isConn) return;
            const msg = 'ST:I:0FQ:03N0:1234\n';
            const bytes = new TextEncoder().encode(msg);
            let payload = bytes;
            if (typeof mqtt !== 'undefined' && mqtt.Buffer && mqtt.Buffer.from)
                payload = mqtt.Buffer.from(bytes);
            log(`📡 Publicando loopback → ${topicRx}`, '');
            client.publish(topicRx, payload, { qos: 1 });
        };

        // Clear
        $('btn-clear').onclick = () => { $('log').innerHTML = ''; pktCount = 0; $('pkt-count').innerHTML = '0<span>pacotes recebidos</span>'; };

        // PWA Service Worker
        if ('serviceWorker' in navigator)
            navigator.serviceWorker.register('sw.js').catch(() => {});

        log('Página carregada — preencha os campos e conecte', '');
        const libOk = typeof mqtt !== 'undefined';
        log(libOk ? '✅ Biblioteca MQTT carregada' : '❌ mqtt.min.js NÃO carregou', libOk ? 'ok' : 'err');
    })();
    </script>
</body>
</html>
